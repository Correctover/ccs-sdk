name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 ccs/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 ccs/ --count --max-complexity=10 --max-line-length=100 --statistics

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy ccs/ --ignore-missing-imports --disallow-untyped-defs || true

      - name: Test with pytest
        run: |
          pip install pytest
          pytest tests/ -v --tb=short

      - name: Test strict verification suite
        run: |
          python strict_9test.py || echo "Integration tests require optional frameworks — skipped in CI"
